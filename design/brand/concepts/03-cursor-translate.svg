<svg xmlns="http://www.w3.org/2000/svg" width="720" height="240" viewBox="0 0 720 240" role="img" aria-labelledby="title desc">
  <title id="title">Cursor Translate brand-mark concept</title>
  <desc id="desc">A cursor selecting text with a translation bubble and Simple Translate JS wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="26" y1="30" x2="158" y2="158" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset=".58" stop-color="#1e40af"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="720" height="240" rx="24" fill="#ffffff"/>
  <g transform="translate(44 28)" filter="url(#shadow)">
    <rect width="184" height="184" rx="34" fill="url(#bg)"/>
    <rect x="38" y="44" width="98" height="18" rx="9" fill="#dbeafe"/>
    <rect x="38" y="72" width="76" height="18" rx="9" fill="#93c5fd"/>
    <rect x="38" y="100" width="110" height="18" rx="9" fill="#38bdf8"/>
    <path d="M82 77l60 55-33 5-14 31-13-91Z" fill="#ffffff" stroke="#0f172a" stroke-width="5" stroke-linejoin="round"/>
    <circle cx="139" cy="55" r="28" fill="#facc15"/>
    <text x="125" y="65" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="900" fill="#0f172a">T</text>
  </g>
  <g transform="translate(268 76)">
    <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800" fill="#0f172a">Simple Translate</text>
    <text x="0" y="48" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#2563eb">JS</text>
    <text x="48" y="48" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#64748b">Cursor Translate</text>
  </g>
</svg>
