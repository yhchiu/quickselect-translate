    <path d="M62 48H44v88h18M122 48h18v88h-18" fill="none" stroke="#eff6ff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="67" y="61" width="50" height="14" rx="7" fill="#dbeafe"/>
