<svg xmlns="http://www.w3.org/2000/svg" width="720" height="240" viewBox="0 0 720 240" role="img" aria-labelledby="title desc">
  <title id="title">Selection Brackets brand-mark concept</title>
  <desc id="desc">A selected text bracket symbol with a translation spark and Simple Translate JS wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="28" y1="28" x2="156" y2="156" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="720" height="240" rx="24" fill="#ffffff"/>
  <g transform="translate(44 28)" filter="url(#shadow)">
