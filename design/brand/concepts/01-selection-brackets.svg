    <rect x="67" y="115" width="58" height="14" rx="7" fill="#93c5fd"/>
    <path d="M113 76l22 22-22 22" fill="none" stroke="#facc15" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M43 34l8-12 8 12 12 8-12 8-8 12-8-12-12-8 12-8Z" fill="#facc15"/>
