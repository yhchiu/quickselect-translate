<svg xmlns="http://www.w3.org/2000/svg" width="720" height="240" viewBox="0 0 720 240" role="img" aria-labelledby="title desc">
  <title id="title">Globe Cursor brand-mark concept</title>
  <desc id="desc">A globe and cursor translation symbol with Simple Translate JS wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="32" y1="28" x2="158" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0891b2"/>
      <stop offset=".55" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity=".17"/>
    </filter>
  </defs>
  <rect width="720" height="240" rx="24" fill="#ffffff"/>
  <g transform="translate(44 28)" filter="url(#shadow)">
    <rect width="184" height="184" rx="34" fill="url(#bg)"/>
    <circle cx="85" cy="82" r="48" fill="none" stroke="#dbeafe" stroke-width="8"/>
    <path d="M37 82h96M85 34c16 16 23 32 23 48s-7 32-23 48M85 34c-16 16-23 32-23 48s7 32 23 48" fill="none" stroke="#bfdbfe" stroke-width="6" stroke-linecap="round"/>
    <path d="M85 130c-15-16-23-32-23-48s8-32 23-48" fill="none" stroke="#f8fafc" stroke-width="5" stroke-linecap="round" opacity=".65"/>
    <path d="M103 95l51 47-29 4-12 26-10-77Z" fill="#ffffff" stroke="#0f172a" stroke-width="5" stroke-linejoin="round"/>
    <circle cx="136" cy="58" r="22" fill="#facc15"/>
    <text x="124" y="66" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="900" fill="#0f172a">A</text>
  </g>
  <g transform="translate(268 76)">
    <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800" fill="#0f172a">Simple Translate</text>
    <text x="0" y="48" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#2563eb">JS</text>
    <text x="48" y="48" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#64748b">Globe Cursor</text>
  </g>
</svg>
