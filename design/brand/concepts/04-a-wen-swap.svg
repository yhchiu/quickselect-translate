<svg xmlns="http://www.w3.org/2000/svg" width="720" height="240" viewBox="0 0 720 240" role="img" aria-labelledby="title desc">
  <title id="title">A Wen Swap brand-mark concept</title>
  <desc id="desc">A and Wen characters connected by swap arrows with Simple Translate JS wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="30" y1="30" x2="154" y2="154" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563eb"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity=".15"/>
    </filter>
  </defs>
  <rect width="720" height="240" rx="24" fill="#ffffff"/>
  <g transform="translate(44 28)" filter="url(#shadow)">
    <rect width="184" height="184" rx="40" fill="url(#bg)"/>
    <circle cx="61" cy="82" r="38" fill="#eff6ff"/>
    <circle cx="123" cy="102" r="38" fill="#dbeafe"/>
    <text x="42" y="98" font-family="Inter, Arial, sans-serif" font-size="49" font-weight="900" fill="#1d4ed8">A</text>
    <text x="100" y="117" font-family="'Noto Sans CJK TC', 'Microsoft JhengHei', Arial, sans-serif" font-size="42" font-weight="900" fill="#0f172a">文</text>
    <path d="M77 49h45l-10-10M107 133H62l10 10" fill="none" stroke="#facc15" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(268 76)">
    <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800" fill="#0f172a">Simple Translate</text>
    <text x="0" y="48" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#2563eb">JS</text>
    <text x="48" y="48" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#64748b">A Wen Swap</text>
  </g>
</svg>
