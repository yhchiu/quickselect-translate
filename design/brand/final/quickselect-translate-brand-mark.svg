<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260" role="img" aria-labelledby="title desc">
  <title id="title">QuickSelect Translate brand-mark</title>
  <desc id="desc">A 文 Swap symbol with QuickSelect Translate wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="34" y1="34" x2="198" y2="198" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563eb"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="142%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#0f172a" flood-opacity=".15"/>
    </filter>
  </defs>
  <rect width="900" height="260" rx="28" fill="#ffffff"/>
  <g transform="translate(42 34)" filter="url(#shadow)">
    <rect width="192" height="192" rx="44" fill="url(#bg)"/>
    <circle cx="67" cy="84" r="42" fill="#eff6ff"/>
    <circle cx="128" cy="104" r="42" fill="#dbeafe"/>
    <text x="45" y="106" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="900" fill="#1d4ed8">A</text>
    <text x="100" y="125" font-family="'Noto Sans CJK TC', 'Microsoft JhengHei', Arial, sans-serif" font-size="55" font-weight="900" fill="#0f172a">文</text>
    <path d="M81 53h53l-12-12M117 149H64l12 12" fill="none" stroke="#facc15" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(286 98)">
    <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="850" fill="#0f172a">QuickSelect</text>
    <text x="0" y="56" font-family="Inter, Arial, sans-serif" font-size="39" font-weight="750" fill="#2563eb">Translate</text>
    <text x="193" y="56" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#64748b">Selected text, instantly translated</text>
  </g>
</svg>
