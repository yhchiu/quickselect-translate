<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="980" viewBox="0 0 1200 980" role="img" aria-labelledby="title desc">
  <title id="title">Simple Translate JS brand-mark concept sheet</title>
  <desc id="desc">Five SVG brand-mark concept drafts: Selection Brackets, Floating Bubble, Cursor Translate, A Wen Swap, and Globe Cursor.</desc>
  <defs>
    <linearGradient id="blueTeal" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="bubble" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1d4ed8"/>
      <stop offset=".62" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="darkCursor" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0f172a"/>
      <stop offset=".58" stop-color="#1e40af"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563eb"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="globe" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0891b2"/>
      <stop offset=".55" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity=".14"/>
    </filter>
    <style>
      .card { fill: #fff; stroke: #dbe3ef; stroke-width: 1; }
      .title { font-family: Inter, Arial, sans-serif; font-size: 26px; font-weight: 800; fill: #0f172a; }
      .label { font-family: Inter, Arial, sans-serif; font-size: 19px; font-weight: 700; fill: #0f172a; }
      .note { font-family: Inter, Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #64748b; }
      .word { font-family: Inter, Arial, sans-serif; font-size: 30px; font-weight: 800; fill: #0f172a; }
      .js { font-family: Inter, Arial, sans-serif; font-size: 21px; font-weight: 800; fill: #2563eb; }
    </style>
  </defs>
  <rect width="1200" height="980" fill="#f8fafc"/>
  <text x="56" y="64" class="title">Simple Translate JS Brand-Mark Concepts</text>
  <text x="56" y="94" class="note">First-pass vector drafts for direction selection</text>

  <g transform="translate(56 132)">
    <rect class="card" width="520" height="238" rx="14"/>
    <g transform="translate(34 40)" filter="url(#shadow)">
      <rect width="120" height="120" rx="24" fill="url(#blueTeal)"/>
      <path d="M41 31H29v58h12M79 31h12v58H79" fill="none" stroke="#eff6ff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="46" y="42" width="32" height="9" rx="5" fill="#dbeafe"/>
      <rect x="46" y="60" width="29" height="9" rx="5" fill="#bfdbfe"/>
      <rect x="46" y="78" width="38" height="9" rx="5" fill="#93c5fd"/>
      <path d="M75 51l15 15-15 15" fill="none" stroke="#facc15" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M28 23l5-8 5 8 8 5-8 5-5 8-5-8-8-5 8-5Z" fill="#facc15"/>
    </g>
    <text x="184" y="74" class="word">Simple Translate</text>
    <text x="184" y="110" class="js">JS</text>
    <text x="222" y="110" class="note">Selection Brackets</text>
    <text x="34" y="196" class="label">1. Selection Brackets</text>
    <text x="34" y="218" class="note">Best for expressing selected-text translation.</text>
  </g>

  <g transform="translate(624 132)">
    <rect class="card" width="520" height="238" rx="14"/>
    <g transform="translate(34 40)" filter="url(#shadow)">
      <circle cx="60" cy="56" r="49" fill="url(#bubble)"/>
      <path d="M41 88c8 8 16 11 27 11-6 8-15 12-27 13 4-7 4-14 0-24Z" fill="#14b8a6"/>
      <circle cx="60" cy="56" r="34" fill="#eff6ff" opacity=".16"/>
      <text x="38" y="65" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="900" fill="#fff">A</text>
      <text x="69" y="66" font-family="'Noto Sans CJK TC', 'Microsoft JhengHei', Arial, sans-serif" font-size="27" font-weight="900" fill="#facc15">文</text>
      <path d="M47 77h25" stroke="#bfdbfe" stroke-width="5" stroke-linecap="round"/>
    </g>
    <text x="184" y="74" class="word">Simple Translate</text>
    <text x="184" y="110" class="js">JS</text>
    <text x="222" y="110" class="note">Floating Bubble</text>
    <text x="34" y="196" class="label">2. Floating Bubble</text>
    <text x="34" y="218" class="note">Best for matching the floating button UI.</text>
  </g>

  <g transform="translate(56 410)">
    <rect class="card" width="520" height="238" rx="14"/>
    <g transform="translate(34 40)" filter="url(#shadow)">
      <rect width="120" height="120" rx="24" fill="url(#darkCursor)"/>
      <rect x="25" y="29" width="64" height="12" rx="6" fill="#dbeafe"/>
      <rect x="25" y="48" width="50" height="12" rx="6" fill="#93c5fd"/>
      <rect x="25" y="67" width="72" height="12" rx="6" fill="#38bdf8"/>
      <path d="M54 51l39 36-22 3-9 20-8-59Z" fill="#fff" stroke="#0f172a" stroke-width="4" stroke-linejoin="round"/>
      <circle cx="92" cy="37" r="19" fill="#facc15"/>
      <text x="83" y="45" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="900" fill="#0f172a">T</text>
    </g>
    <text x="184" y="74" class="word">Simple Translate</text>
    <text x="184" y="110" class="js">JS</text>
    <text x="222" y="110" class="note">Cursor Translate</text>
    <text x="34" y="196" class="label">3. Cursor Translate</text>
    <text x="34" y="218" class="note">Best for communicating mouse selection behavior.</text>
  </g>

  <g transform="translate(624 410)">
    <rect class="card" width="520" height="238" rx="14"/>
    <g transform="translate(34 40)" filter="url(#shadow)">
      <rect width="120" height="120" rx="27" fill="url(#blue)"/>
      <circle cx="40" cy="54" r="25" fill="#eff6ff"/>
      <circle cx="81" cy="67" r="25" fill="#dbeafe"/>
      <text x="27" y="65" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="900" fill="#1d4ed8">A</text>
      <text x="66" y="78" font-family="'Noto Sans CJK TC', 'Microsoft JhengHei', Arial, sans-serif" font-size="29" font-weight="900" fill="#0f172a">文</text>
      <path d="M51 32h30l-7-7M72 90H42l7 7" fill="none" stroke="#facc15" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="184" y="74" class="word">Simple Translate</text>
    <text x="184" y="110" class="js">JS</text>
    <text x="222" y="110" class="note">A Wen Swap</text>
    <text x="34" y="196" class="label">4. A 文 Swap</text>
    <text x="34" y="218" class="note">Most classic and immediately readable.</text>
  </g>

  <g transform="translate(56 688)">
    <rect class="card" width="1088" height="238" rx="14"/>
    <g transform="translate(34 40)" filter="url(#shadow)">
      <rect width="120" height="120" rx="24" fill="url(#globe)"/>
      <circle cx="56" cy="54" r="32" fill="none" stroke="#dbeafe" stroke-width="6"/>
      <path d="M24 54h64M56 22c11 11 15 21 15 32s-4 21-15 32M56 22c-11 11-15 21-15 32s4 21 15 32" fill="none" stroke="#bfdbfe" stroke-width="4" stroke-linecap="round"/>
      <path d="M68 63l34 31-19 3-8 17-7-51Z" fill="#fff" stroke="#0f172a" stroke-width="4" stroke-linejoin="round"/>
      <circle cx="90" cy="38" r="15" fill="#facc15"/>
      <text x="82" y="45" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="900" fill="#0f172a">A</text>
    </g>
    <text x="184" y="74" class="word">Simple Translate</text>
    <text x="184" y="110" class="js">JS</text>
    <text x="222" y="110" class="note">Globe Cursor</text>
    <text x="34" y="196" class="label">5. Globe Cursor</text>
    <text x="34" y="218" class="note">Best when you want a broader global translation product feel.</text>
  </g>
</svg>
